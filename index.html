<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Video</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
    }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline loop>
    <source id="source" type="video/mp4">
</video>

<script>
    const count = 5;
    const random = Math.floor(Math.random() * count) + 1;

    const video = document.getElementById("video");
    const source = document.getElementById("source");

    source.src = `${random}.mp4`;
    video.load();

    video.play().catch(() => {});
</script>

</body>
</html>
